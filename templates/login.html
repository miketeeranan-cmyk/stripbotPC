<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stripchat Tracker — Log in</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
<style>
  /* Scoped to this page only -- just enough to lay out a plain login form
     with the existing .card/.btn look, no changes to dashboard.css. */
  .login-form {
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
    margin-top: 1.25rem;
    text-align: left;
  }
  .login-field label {
    display: block;
    font-size: 0.78rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
    margin-bottom: 0.35rem;
  }
  .login-field input {
    width: 100%;
    padding: 0.6rem 0.75rem;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--text);
    font-size: 0.95rem;
  }
  .login-field input:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  .login-form .btn-primary {
    margin-top: 0.4rem;
  }
</style>
</head>
<body>
<div id="app">

  <section class="screen">
    <div class="card">
      <h1>Stripchat User Tracker</h1>
      <p class="subtitle">Log in to continue</p>

      {% if error %}
      <div class="error">Incorrect username or password.</div>
      {% endif %}

      <form class="login-form" method="post" action="{{ url_for('login') }}">
        <div class="login-field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" required autofocus>
        </div>
        <div class="login-field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button class="btn btn-primary" type="submit">Log in</button>
      </form>
    </div>
  </section>

</div>
</body>
</html>
