name: Release

# Push a tag like v1.2.3 to build the desktop app for Windows and publish it
# as a GitHub Release. launcher.py polls the "latest release" API on every
# launch and pulls whichever platform asset matches, so a tag push here is
# what actually reaches the operator's machine.
#
# macOS is deliberately NOT built here. GitHub removed the Intel-hosted
# macos-13 image from its runner fleet, and the arm64 macos-latest
# replacement can't reliably produce a working x86_64 build for the
# operator's Intel Mac: macos-13 jobs queue forever instead of failing,
# setup-python's architecture: x64 silently falls back to native arm64,
# python.org's universal2 build lets pip pick arm64-only wheels for
# compiled deps (broke on cryptography's _rust.abi3.so), and even
# bootstrapping a genuine x86_64-only Python via Rosetta + a fresh
# x86_64-side Homebrew got this far without a working build in several
# attempts. Revisit macOS releases if that operator hardware changes or
# GitHub brings back an Intel-hosted image.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-build.txt

      # Build + package one target at a time -- PyInstaller's --clean can
      # wipe dist/'s other target, so don't build both before packaging
      # either.
      - name: Build + package core app
        run: |
          python packaging/build.py --core
          python packaging/package_release.py --core

      - name: Build + package launcher
        run: |
          python packaging/build.py --launcher
          python packaging/package_release.py --launcher

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-windows-latest
          path: |
            StripTrackerCore-*.zip
            StripTracker-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*.zip
          generate_release_notes: true
