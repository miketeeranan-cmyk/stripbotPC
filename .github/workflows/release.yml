name: Release

# Push a tag like v1.2.3 to build the desktop app for macOS + Windows and
# publish it as a GitHub Release. launcher.py polls the "latest release" API
# on every launch and pulls whichever platform asset matches, so a tag push
# here is what actually reaches the operator's machine.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        # macos-13 = Intel (x86_64) runner -- macos-latest/macos-14+ default
        # to Apple Silicon (arm64), which won't run on an Intel Mac at all.
        # Pinned to match the actual operator hardware; switch back to
        # macos-latest (or add both) if that ever changes.
        os: [macos-13, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-build.txt

      # Build + package one target at a time -- PyInstaller's --clean can
      # wipe dist/'s other target, so don't build both before packaging
      # either.
      - name: Build + package core app
        run: |
          python packaging/build.py --core
          python packaging/package_release.py --core

      - name: Build + package launcher
        run: |
          python packaging/build.py --launcher
          python packaging/package_release.py --launcher

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            StripTrackerCore-*.zip
            StripTracker-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*.zip
          generate_release_notes: true
