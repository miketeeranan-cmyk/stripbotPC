name: Release

# Push a tag like v1.2.3 to build the desktop app for macOS + Windows and
# publish it as a GitHub Release. launcher.py polls the "latest release" API
# on every launch and pulls whichever platform asset matches, so a tag push
# here is what actually reaches the operator's machine.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        # macos-13 (the last Intel-hosted macOS image) is gone from GitHub's
        # runner fleet -- jobs requesting it now queue forever instead of
        # failing outright. macos-latest is Apple Silicon (arm64), which
        # won't run on the operator's Intel Mac at all, so the mac leg
        # builds x86_64 Python under Rosetta 2 (setup-python's
        # architecture: x64 on an arm64 runner) to produce a genuine x86_64
        # binary instead. Switch back to a plain macos-13 pin if GitHub ever
        # brings Intel hosted runners back.
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rosetta 2 (mac only, for x86_64 Python)
        if: runner.os == 'macOS'
        run: softwareupdate --install-rosetta --agree-to-license

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-build.txt

      - name: Verify mac Python is x86_64
        if: runner.os == 'macOS'
        run: python -c "import platform; assert platform.machine() == 'x86_64', platform.machine()"

      # Build + package one target at a time -- PyInstaller's --clean can
      # wipe dist/'s other target, so don't build both before packaging
      # either.
      - name: Build + package core app
        run: |
          python packaging/build.py --core
          python packaging/package_release.py --core

      - name: Build + package launcher
        run: |
          python packaging/build.py --launcher
          python packaging/package_release.py --launcher

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            StripTrackerCore-*.zip
            StripTracker-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*.zip
          generate_release_notes: true
